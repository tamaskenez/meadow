name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            cmake_generator: -G Xcode
          - os: windows-latest
            cmake_generator: ""

    steps:
      - uses: actions/checkout@v6

      - name: Cache Conan packages
        id: conan-cache
        uses: actions/cache@v5
        with:
          path: id
          key: conan-${{ matrix.os }}-${{ hashFiles('conanfile.txt') }}

      - name: Install Conan
        if: steps.conan-cache.outputs.cache-hit != 'true'
        uses: conan-io/setup-conan@v1

      - name: Build Conan dependencies
        if: steps.conan-cache.outputs.cache-hit != 'true'
        shell: bash
        run: ./1_build_conan.sh --use-deployer

      - name: Configure
        run: cmake -S . -B _b ${{ matrix.cmake_generator }}

      - name: Build
        run: cmake --build _b --config Debug

      - name: Test
        run: ctest --test-dir _b -C Debug --output-on-failure
